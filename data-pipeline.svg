<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 372" width="1060" height="372" fill="none" role="img" aria-label="Narasimha Royal, Data Engineer. End to end data pipeline: sources, Kafka ingest, bronze, silver, dbt, gold, serving, with Great Expectations quality gate and dead letter queue, orchestrated by Airflow.">
  <defs>
    <linearGradient id="gem" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1ba1e3"/>
      <stop offset="0.5" stop-color="#9168cf"/>
      <stop offset="1" stop-color="#ec5f78"/>
    </linearGradient>
  </defs>

  <!-- ===== NAME + TITLE ===== -->
  <text x="530" y="44" text-anchor="middle" fill="url(#gem)" font-size="38" font-weight="800"
        font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif" letter-spacing="2">NARASIMHA ROYAL</text>
  <text x="530" y="72" text-anchor="middle" fill="#8b949e" font-size="14" font-weight="600"
        font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif" letter-spacing="6">DATA ENGINEER &#160;&#183;&#160; PIPELINE BUILDER</text>

  <!-- ===== ORCHESTRATION LAYER (Airflow) ===== -->
  <rect x="40" y="92" width="980" height="32" rx="16" fill="#0d1117" stroke="#9168cf" stroke-width="1.3" opacity="0.9"/>
  <text x="530" y="113" text-anchor="middle" fill="#b89ce0" font-size="12" font-weight="700" letter-spacing="4"
        font-family="'Segoe UI',Roboto,sans-serif">A I R F L O W &#160;&#160; &#183; &#160;&#160; O R C H E S T R A T I O N   &amp;   S C H E D U L I N G</text>

  <!-- orchestration drop-connectors to each stage (faint) -->
  <g stroke="#9168cf" stroke-width="1.3" stroke-dasharray="2 3" opacity="0.32">
    <line x1="90"  y1="124" x2="90"  y2="150"/>
    <line x1="235" y1="124" x2="235" y2="150"/>
    <line x1="380" y1="124" x2="380" y2="150"/>
    <line x1="525" y1="124" x2="525" y2="150"/>
    <line x1="670" y1="124" x2="670" y2="150"/>
    <line x1="815" y1="124" x2="815" y2="150"/>
    <line x1="960" y1="124" x2="960" y2="150"/>
  </g>

  <!-- ===== MAIN FLOW: round dots marching left to right (behind stage cards) ===== -->
  <line x1="90" y1="186" x2="960" y2="186" stroke="url(#gem)" stroke-width="2" opacity="0.22"/>
  <line x1="90" y1="186" x2="960" y2="186" stroke="url(#gem)" stroke-width="5"
        stroke-linecap="round" stroke-dasharray="0.1 11">
    <animate attributeName="stroke-dashoffset" from="0" to="-11.1" dur="0.6s" repeatCount="indefinite" calcMode="linear"/>
  </line>

  <!-- ===== DEAD LETTER QUEUE branch (rejected rows drop out at the quality gate) ===== -->
  <line x1="452" y1="196" x2="452" y2="270" stroke="#ec5f78" stroke-width="2" stroke-dasharray="3 4" opacity="0.55"/>
  <circle r="3" cx="452" fill="#ec5f78">
    <animate attributeName="cy" values="196;270" dur="2.2s" begin="0s" repeatCount="indefinite" calcMode="linear"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2.2s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle r="3" cx="452" fill="#ec5f78">
    <animate attributeName="cy" values="196;270" dur="2.2s" begin="1.1s" repeatCount="indefinite" calcMode="linear"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2.2s" begin="1.1s" repeatCount="indefinite"/>
  </circle>
  <rect x="400" y="270" width="104" height="32" rx="8" fill="#0d1117" stroke="#ec5f78" stroke-width="1.4"/>
  <text x="452" y="290" text-anchor="middle" fill="#ec8a9c" font-size="11" font-weight="700"
        font-family="'Segoe UI',Roboto,sans-serif">DEAD LETTER Q</text>

  <!-- ===== STAGE CARDS ===== -->
  <g font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
    <!-- SOURCES -->
    <g>
      <rect x="30" y="150" width="120" height="72" rx="12" fill="#0d1117" stroke="url(#gem)" stroke-width="1.8"/>
      <rect x="42" y="161" width="96" height="3.5" rx="2" fill="#1ba1e3"/>
      <text x="90" y="192" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="800">SOURCES</text>
      <text x="90" y="210" text-anchor="middle" fill="#8b949e" font-size="10.5" font-weight="500">APIs &#183; Files &#183; DB</text>
    </g>
    <!-- KAFKA -->
    <g>
      <rect x="175" y="150" width="120" height="72" rx="12" fill="#0d1117" stroke="url(#gem)" stroke-width="1.8"/>
      <rect x="187" y="161" width="96" height="3.5" rx="2" fill="#4f8fde"/>
      <text x="235" y="192" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="800">KAFKA</text>
      <text x="235" y="210" text-anchor="middle" fill="#8b949e" font-size="10.5" font-weight="500">stream ingest</text>
    </g>
    <!-- BRONZE -->
    <g>
      <rect x="320" y="150" width="120" height="72" rx="12" fill="#0d1117" stroke="#d99057" stroke-width="1.8"/>
      <rect x="332" y="161" width="96" height="3.5" rx="2" fill="#d99057"/>
      <text x="380" y="192" text-anchor="middle" fill="#e8b483" font-size="16" font-weight="800">BRONZE</text>
      <text x="380" y="210" text-anchor="middle" fill="#8b949e" font-size="10.5" font-weight="500">raw landing</text>
    </g>
    <!-- SILVER -->
    <g>
      <rect x="465" y="150" width="120" height="72" rx="12" fill="#0d1117" stroke="#c2ccd6" stroke-width="1.8"/>
      <rect x="477" y="161" width="96" height="3.5" rx="2" fill="#c2ccd6"/>
      <text x="525" y="192" text-anchor="middle" fill="#dfe6ee" font-size="16" font-weight="800">SILVER</text>
      <text x="525" y="210" text-anchor="middle" fill="#8b949e" font-size="10.5" font-weight="500">clean &#183; dedupe</text>
    </g>
    <!-- dbt -->
    <g>
      <rect x="610" y="150" width="120" height="72" rx="12" fill="#0d1117" stroke="url(#gem)" stroke-width="1.8"/>
      <rect x="622" y="161" width="96" height="3.5" rx="2" fill="#ec5f78"/>
      <text x="670" y="192" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="800">dbt</text>
      <text x="670" y="210" text-anchor="middle" fill="#8b949e" font-size="10.5" font-weight="500">transform &#183; test</text>
    </g>
    <!-- GOLD -->
    <g>
      <rect x="755" y="150" width="120" height="72" rx="12" fill="#0d1117" stroke="#e8c15a" stroke-width="1.8"/>
      <rect x="767" y="161" width="96" height="3.5" rx="2" fill="#e8c15a"/>
      <text x="815" y="192" text-anchor="middle" fill="#eed384" font-size="16" font-weight="800">GOLD</text>
      <text x="815" y="210" text-anchor="middle" fill="#8b949e" font-size="10.5" font-weight="500">data marts</text>
    </g>
    <!-- SERVE -->
    <g>
      <rect x="900" y="150" width="120" height="72" rx="12" fill="#0d1117" stroke="url(#gem)" stroke-width="1.8"/>
      <rect x="912" y="161" width="96" height="3.5" rx="2" fill="#9168cf"/>
      <text x="960" y="192" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="800">SERVE</text>
      <text x="960" y="210" text-anchor="middle" fill="#8b949e" font-size="10.5" font-weight="500">BI &#183; Dashboards</text>
    </g>
  </g>

  <!-- ===== QUALITY GATE (Great Expectations) sits on the bronze -> silver hop ===== -->
  <circle cx="452" cy="186" r="13" fill="#0d1117" stroke="url(#gem)" stroke-width="1.8"/>
  <text x="452" y="190" text-anchor="middle" fill="#e6edf3" font-size="10" font-weight="800"
        font-family="'Segoe UI',Roboto,sans-serif">GE</text>

  <!-- ===== CAPTIONS ===== -->
  <text x="530" y="332" text-anchor="middle" fill="#6b7682" font-size="11.5" letter-spacing="2.5" font-weight="600"
        font-family="'Segoe UI',Roboto,sans-serif">SOURCES &#8594; INGEST &#8594; BRONZE &#8594; SILVER &#8594; GOLD &#8594; SERVE</text>
  <text x="530" y="354" text-anchor="middle" fill="#586069" font-size="10.5" letter-spacing="1"
        font-family="'Segoe UI',Roboto,sans-serif">Great Expectations quality gates &#160;&#183;&#160; dead letter queue for bad rows &#160;&#183;&#160; containerized with Docker</text>
</svg>
