<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 190" width="900" height="190" fill="none" role="img" aria-label="Animated data pipeline: Sources to Kafka to Airflow to dbt to Postgres">
  <defs>
    <linearGradient id="gem" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1ba1e3"/>
      <stop offset="0.5" stop-color="#9168cf"/>
      <stop offset="1" stop-color="#ec5f78"/>
    </linearGradient>
    <radialGradient id="packet" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.4" stop-color="#7fdfff"/>
      <stop offset="1" stop-color="#1ba1e3" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- pipe (marching-ant flow) -->
  <line x1="60" y1="78" x2="840" y2="78" stroke="url(#gem)" stroke-width="3" stroke-linecap="round" stroke-dasharray="2 12" opacity="0.85">
    <animate attributeName="stroke-dashoffset" from="0" to="-14" dur="0.5s" repeatCount="indefinite"/>
  </line>

  <!-- traveling data packets -->
  <g filter="url(#glow)">
    <circle r="6" cy="78" fill="url(#packet)">
      <animate attributeName="cx" values="60;840" dur="3.6s" repeatCount="indefinite" calcMode="linear"/>
    </circle>
    <circle r="5" cy="78" fill="url(#packet)">
      <animate attributeName="cx" values="60;840" dur="3.6s" begin="1.2s" repeatCount="indefinite" calcMode="linear"/>
    </circle>
    <circle r="5" cy="78" fill="url(#packet)">
      <animate attributeName="cx" values="60;840" dur="3.6s" begin="2.4s" repeatCount="indefinite" calcMode="linear"/>
    </circle>
  </g>

  <!-- nodes -->
  <g font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
    <!-- node template: circle + pulsing ring + label + caption -->
    <!-- SOURCES -->
    <g transform="translate(90,78)">
      <circle r="30" fill="#0d1117" stroke="url(#gem)" stroke-width="2.5"/>
      <circle r="30" fill="none" stroke="#1ba1e3" stroke-width="2">
        <animate attributeName="r" values="30;38;30" dur="3.6s" begin="0s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0;0.7" dur="3.6s" begin="0s" repeatCount="indefinite"/>
      </circle>
      <text y="5" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">SRC</text>
    </g>
    <text x="90" y="140" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="600">SOURCES</text>

    <!-- KAFKA -->
    <g transform="translate(278,78)">
      <circle r="30" fill="#0d1117" stroke="url(#gem)" stroke-width="2.5"/>
      <circle r="30" fill="none" stroke="#4f8fde" stroke-width="2">
        <animate attributeName="r" values="30;38;30" dur="3.6s" begin="0.9s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0;0.7" dur="3.6s" begin="0.9s" repeatCount="indefinite"/>
      </circle>
      <text y="5" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">⌁</text>
    </g>
    <text x="278" y="140" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="600">KAFKA</text>

    <!-- AIRFLOW -->
    <g transform="translate(466,78)">
      <circle r="30" fill="#0d1117" stroke="url(#gem)" stroke-width="2.5"/>
      <circle r="30" fill="none" stroke="#9168cf" stroke-width="2">
        <animate attributeName="r" values="30;38;30" dur="3.6s" begin="1.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0;0.7" dur="3.6s" begin="1.8s" repeatCount="indefinite"/>
      </circle>
      <text y="5" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">DAG</text>
    </g>
    <text x="466" y="140" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="600">AIRFLOW</text>

    <!-- dbt -->
    <g transform="translate(654,78)">
      <circle r="30" fill="#0d1117" stroke="url(#gem)" stroke-width="2.5"/>
      <circle r="30" fill="none" stroke="#c861a8" stroke-width="2">
        <animate attributeName="r" values="30;38;30" dur="3.6s" begin="2.7s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0;0.7" dur="3.6s" begin="2.7s" repeatCount="indefinite"/>
      </circle>
      <text y="5" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">dbt</text>
    </g>
    <text x="654" y="140" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="600">TRANSFORM</text>

    <!-- POSTGRES -->
    <g transform="translate(810,78)">
      <circle r="30" fill="#0d1117" stroke="url(#gem)" stroke-width="2.5"/>
      <circle r="30" fill="none" stroke="#ec5f78" stroke-width="2">
        <animate attributeName="r" values="30;40;30" dur="3.6s" begin="3.3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0;0.8" dur="3.6s" begin="3.3s" repeatCount="indefinite"/>
      </circle>
      <text y="5" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="700">SQL</text>
    </g>
    <text x="810" y="140" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="600">WAREHOUSE</text>
  </g>

  <!-- subtle caption -->
  <text x="450" y="172" text-anchor="middle" fill="#586069" font-size="11" letter-spacing="3" font-family="'Segoe UI',Roboto,sans-serif">I N G E S T &#160;&#8594;&#160; O R C H E S T R A T E &#160;&#8594;&#160; M O D E L &#160;&#8594;&#160; S E R V E</text>
</svg>
